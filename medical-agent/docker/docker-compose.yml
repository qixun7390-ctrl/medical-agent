version: "3.9"
services:
  api:
    build: ..
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=medical_agent
    ports:
      - "5432:5432"
