services:
  vllm-qwen-1p5b:
    image: egs-registry.cn-hangzhou.cr.aliyuncs.com/egs/vllm:0.8.5-pytorch2.6-cu126-20250430
    container_name: vllm-qwen-1p5b
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command:
      - "vllm"
      - "serve"
      - "/models/Qwen2.5-1.5B-Instruct"
      - "--dtype=half"
      - "--max-model-len=4096"
      - "--gpu-memory-utilization=0.8"
      - "--max-num-seqs=2"
      - "--max-num-batched-tokens=2048"
      - "--host=0.0.0.0"
      - "--port=8001"
    volumes:
      - "E:/PythonProject2/medical-agent/model/qwen/Qwen2___5-1___5B-Instruct:/models/Qwen2.5-1.5B-Instruct"
